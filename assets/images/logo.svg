<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100">
  <defs>
    <style>
      .wm-head { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; }
      .wm-sub  { font-family: 'Inter', Arial, Helvetica, sans-serif; }
    </style>
  </defs>
  <!-- MARK (centered in 0 0 100 100 area) -->
  <g transform="translate(50,50)">
    <!-- Outer diamond -->
    <path d="M0,-44 L44,0 L0,44 L-44,0 Z" fill="none" stroke="#C9A84C" stroke-width="1.75"/>
    <!-- Cardinal hairlines outer → inner -->
    <line x1="0"  y1="-44" x2="0"  y2="-27" stroke="#C9A84C" stroke-width="0.75"/>
    <line x1="44" y1="0"   x2="27" y2="0"   stroke="#C9A84C" stroke-width="0.75"/>
    <line x1="0"  y1="44"  x2="0"  y2="27"  stroke="#C9A84C" stroke-width="0.75"/>
    <line x1="-44" y1="0"  x2="-27" y2="0"  stroke="#C9A84C" stroke-width="0.75"/>
    <!-- Inner diamond -->
    <path d="M0,-27 L27,0 L0,27 L-27,0 Z" fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.5"/>
    <!-- Cardinal dots on outer diamond -->
    <circle cx="0"   cy="-44" r="2.75" fill="#C9A84C"/>
    <circle cx="44"  cy="0"   r="2.75" fill="#C9A84C"/>
    <circle cx="0"   cy="44"  r="2.75" fill="#C9A84C"/>
    <circle cx="-44" cy="0"   r="2.75" fill="#C9A84C"/>
    <!-- Center mark -->
    <circle cx="0" cy="0" r="3.5" fill="#C9A84C"/>
    <circle cx="0" cy="0" r="1.5" fill="#0B1F3A"/>
  </g>
  <!-- VERTICAL RULE -->
  <line x1="115" y1="16" x2="115" y2="84" stroke="#C9A84C" stroke-width="0.75" opacity="0.55"/>
  <!-- WORDMARK -->
  <!-- Company name -->
  <text x="134" y="44"
        class="wm-head"
        font-size="31"
        font-weight="700"
        fill="#0B1F3A"
        letter-spacing="5">CLARENDON</text>
  <!-- Thin gold rule -->
  <line x1="134" y1="53" x2="470" y2="53" stroke="#C9A84C" stroke-width="0.75"/>
  <!-- Sub name -->
  <text x="134" y="68"
        class="wm-sub"
        font-size="13"
        font-weight="600"
        fill="#C9A84C"
        letter-spacing="11">CAPITAL</text>
  <!-- Tagline -->
  <text x="134" y="84"
        class="wm-sub"
        font-size="8.5"
        fill="#6B7280"
        letter-spacing="3.5">PRIVATE WEALTH MANAGEMENT  ·  EST. 2003</text>
</svg>