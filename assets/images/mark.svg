<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer diamond -->
  <path d="M50,6 L94,50 L50,94 L6,50 Z" fill="none" stroke="#C9A84C" stroke-width="1.75"/>
  <!-- Cardinal hairlines outer → inner -->
  <line x1="50" y1="6"  x2="50" y2="23" stroke="#C9A84C" stroke-width="0.75"/>
  <line x1="94" y1="50" x2="77" y2="50" stroke="#C9A84C" stroke-width="0.75"/>
  <line x1="50" y1="94" x2="50" y2="77" stroke="#C9A84C" stroke-width="0.75"/>
  <line x1="6"  y1="50" x2="23" y2="50" stroke="#C9A84C" stroke-width="0.75"/>
  <!-- Inner diamond -->
  <path d="M50,23 L77,50 L50,77 L23,50 Z" fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Cardinal dots on outer diamond -->
  <circle cx="50" cy="6"  r="2.75" fill="#C9A84C"/>
  <circle cx="94" cy="50" r="2.75" fill="#C9A84C"/>
  <circle cx="50" cy="94" r="2.75" fill="#C9A84C"/>
  <circle cx="6"  cy="50" r="2.75" fill="#C9A84C"/>
  <!-- Center mark -->
  <circle cx="50" cy="50" r="3.5" fill="#C9A84C"/>
  <circle cx="50" cy="50" r="1.5" fill="#0B1F3A"/>
</svg>